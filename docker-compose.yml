version: '3.8'

services:
  # PostgreSQL Database with PostGIS extension
  db:
    image: postgis/postgis:15-3.3
    container_name: investigative-db
    environment:
      POSTGRES_DB: investigative_studio
      POSTGRES_USER: studio_user
      POSTGRES_PASSWORD: secure_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investigative-backend
    environment:
      DATABASE_URL: postgresql://studio_user:secure_password_change_me@db:5432/investigative_studio
      FLASK_ENV: development
      FLASK_APP: app.py
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investigative-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: investigative-network
